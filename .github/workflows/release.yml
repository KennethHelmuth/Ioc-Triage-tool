name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: true
            bin_name: ioc-triage
            archive_ext: .tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
            bin_name: ioc-triage
            archive_ext: .tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
            bin_name: ioc-triage
            archive_ext: .tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
            bin_name: ioc-triage.exe
            archive_ext: .zip

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross

      - name: Build binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.bin_name }}

      - name: Create archive (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p release_package
          cp target/${{ matrix.target }}/release/${{ matrix.bin_name }} release_package/
          cp README.md release_package/
          cp LICENSE release_package/ 2>/dev/null || true
          cd release_package
          tar -czf ../ioc-triage-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}${{ matrix.archive_ext }} *
        shell: bash

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir release_package
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.bin_name }} release_package/
          Copy-Item README.md release_package/
          Copy-Item LICENSE release_package/ -ErrorAction SilentlyContinue
          cd release_package
          Compress-Archive -Path * -DestinationPath ../ioc-triage-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}${{ matrix.archive_ext }}
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ioc-triage-${{ matrix.target }}
          path: ioc-triage-*${{ matrix.archive_ext }}

  create-release:
    name: Create Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: IOC Triage v${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: true
          files: artifacts/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
